; ---------------------------------------------------------------------------
; Desktop Simulator (SDL2)
; Build: pio run -e simulator
; Run:   .pio/build/simulator/program --board touch-amoled-241b
; ---------------------------------------------------------------------------
[env:simulator]
platform = native
framework =
build_type = debug
extra_scripts =
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
build_flags =
    -DSIMULATOR
    -DAPP_STARFIELD
    -DDISPLAY_WIDTH=450
    -DDISPLAY_HEIGHT=600
    '-DDISPLAY_DRIVER="Simulator"'
    '-DDISPLAY_IF="SDL"'
    -O0 -xc++ -std=c++17 -lSDL2 -lpthread
    -I/usr/include/SDL2
    -Isim
    -Iinclude
    -Iapps/starfield
    -Ilib/StarField
build_src_filter =
    +<../sim/>
    +<../apps/starfield/>
    +<../lib/StarField/>
