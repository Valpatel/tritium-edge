; ESP32 Hardware Project - Multi-board Configuration (esp_lcd migration)
; Each environment targets a specific Waveshare ESP32-S3 display board.
;
; Build:   pio run -e <env-name>
; Upload:  pio run -e <env-name> -t upload
; Monitor: pio device monitor -b 115200
;
; App selection:
;   Each board defaults to the starfield app (-DAPP_STARFIELD).
;   To build a different app, change the -DAPP_xxx flag in the environment
;   or override on the CLI:
;     pio run -e touch-amoled-241b --build-flag="-DAPP_MY_APP"

[platformio]
default_envs = touch-amoled-241b
src_dir = src
lib_dir = lib
include_dir = include

; ---------------------------------------------------------------------------
; Shared settings for all ESP32-S3 boards
; ---------------------------------------------------------------------------
[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
extra_scripts = pre:pre_build.py
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
monitor_speed = 115200
lib_ldf_mode = off
lib_deps =
    lvgl/lvgl@~9.2.0
    ; NimBLE is built into Arduino ESP32 v3.x (ESP-IDF 5.x) — no external lib needed
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude
    -Ilib/display
    -Ilib/display/drivers
    -Ilib/display/boards

; ---------------------------------------------------------------------------
; App presets (reusable sections)
; ---------------------------------------------------------------------------
[app_starfield]
build_flags =
    -DAPP_STARFIELD
    -Iapps/starfield
    -Ilib/StarField
    -Ilib/tritium_splash
build_src_filter =
    +<../src/>
    +<../apps/starfield/>
    +<../lib/StarField/>
    +<../lib/display/>
    +<../lib/tritium_splash/>

; Fleet-ready starfield: WiFi + heartbeat + diagnostics background services
; pre_build.py auto-adds Arduino framework library paths when ENABLE_WIFI is set
[app_starfield_fleet]
build_flags =
    -DAPP_STARFIELD
    -DENABLE_WIFI
    -DENABLE_HEARTBEAT
    -DENABLE_WEBSERVER
    -DENABLE_DIAG
    -DENABLE_ESPNOW
    -DDBG_LEVEL=3
    -Iapps/starfield
    -Ilib/StarField
    -Ilib/hal_wifi
    -Ilib/hal_heartbeat
    -Ilib/hal_provision
    -Ilib/hal_debug
    -Ilib/hal_fs
    -Ilib/hal_webserver
    -Ilib/hal_diag
    -Ilib/hal_diaglog
    -Ilib/hal_power
    -Ilib/hal_espnow
    -Ilib/tritium_splash
build_src_filter =
    +<../src/>
    +<../apps/starfield/>
    +<../lib/StarField/>
    +<../lib/display/>
    +<../lib/hal_wifi/>
    +<../lib/hal_heartbeat/>
    +<../lib/hal_provision/>
    +<../lib/hal_debug/>
    +<../lib/hal_fs/>
    +<../lib/hal_webserver/>
    +<../lib/hal_diag/>
    +<../lib/hal_diaglog/>
    +<../lib/hal_power/>
    +<../lib/hal_espnow/>
    +<../lib/tritium_splash/>

; Sensor node: starfield screensaver + WiFi + heartbeat + BLE + diagnostics
; Reports BLE device presence to edge server via heartbeat
[app_sensor_node]
build_flags =
    -DAPP_STARFIELD
    -DENABLE_WIFI
    -DENABLE_HEARTBEAT
    -DENABLE_BLE_SCANNER
    -DENABLE_WEBSERVER
    -DENABLE_DIAG
    -DDBG_LEVEL=3
    -Iapps/starfield
    -Ilib/StarField
    -Ilib/hal_wifi
    -Ilib/hal_heartbeat
    -Ilib/hal_provision
    -Ilib/hal_debug
    -Ilib/hal_fs
    -Ilib/hal_ble_scanner
    -Ilib/hal_webserver
    -Ilib/hal_diag
    -Ilib/hal_diaglog
    -Ilib/hal_power
    -Ilib/tritium_splash
build_src_filter =
    +<../src/>
    +<../apps/starfield/>
    +<../lib/StarField/>
    +<../lib/display/>
    +<../lib/hal_wifi/>
    +<../lib/hal_heartbeat/>
    +<../lib/hal_provision/>
    +<../lib/hal_debug/>
    +<../lib/hal_fs/>
    +<../lib/hal_ble_scanner/>
    +<../lib/hal_webserver/>
    +<../lib/hal_diag/>
    +<../lib/hal_diaglog/>
    +<../lib/hal_power/>
    +<../lib/tritium_splash/>

; LoRa sensor node: sensor_node + LoRa radio / Meshtastic mesh
[app_lora_node]
extends = app_sensor_node
build_flags =
    ${app_sensor_node.build_flags}
    -DENABLE_LORA
    -Ilib/hal_lora
build_src_filter =
    ${app_sensor_node.build_src_filter}
    +<../lib/hal_lora/>

[app_ui_demo]
build_flags =
    -DAPP_UI_DEMO
    -DENABLE_WIFI
    -Iapps/ui_demo
    -Ilib/hal_ui
