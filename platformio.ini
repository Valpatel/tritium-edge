    +<../apps/ui_demo/>
    +<../lib/hal_ui/>
    +<../lib/hal_wifi/>
    +<../lib/hal_heartbeat/>
    +<../lib/hal_provision/>
    +<../lib/hal_debug/>
    +<../lib/hal_fs/>
    +<../lib/display/>
    +<../lib/tritium_splash/>

[app_wifi_setup]
build_flags =
    -DAPP_WIFI_SETUP
    -DENABLE_WIFI
    -Iapps/wifi_setup
    -Ilib/hal_ui
    -Ilib/hal_wifi
    -Ilib/hal_heartbeat
    -Ilib/hal_provision
    -Ilib/hal_debug
    -Ilib/hal_fs
    -Ilib/tritium_splash
build_src_filter =
    +<../src/>
    +<../apps/wifi_setup/>
    +<../lib/hal_ui/>
    +<../lib/hal_wifi/>
    +<../lib/hal_heartbeat/>
    +<../lib/hal_provision/>
    +<../lib/hal_debug/>
    +<../lib/hal_fs/>
    +<../lib/display/>
    +<../lib/tritium_splash/>>

; ---------------------------------------------------------------------------
; Tritium-OS: full platform with WiFi, services, OTA, settings, events
; file manager, web dashboard, and LVGL shell (for touch-equipped boards).
; ---------------------------------------------------------------------------
[app_tritium_os]
build_flags =
    -DAPP_STARFIELD
    -DENABLE_WIFI
    -DENABLE_HEARTBEAT
    -DENABLE_WEBSERVER
    -DENABLE_DIAG
    -DENABLE_ESPNOW
    -DENABLE_OTA
    -DENABLE_FILE_MANAGER
    -DENABLE_SETTINGS
    -DENABLE_OS_EVENTS
    -DENABLE_STORAGE
    -DENABLE_MQTT_SC_BRIDGE
    ; BLE scanner disabled in OS builds — NimBLE + WiFi coexistence fails
    ; (ESP_ERR_NO_MEM on wifi_init when BLE stack is already running)
    ; -DENABLE_BLE_SCANNER
    -DDBG_LEVEL=3
    -Iapps/starfield
    -Ilib/StarField
    -Ilib/hal_wifi
    -Ilib/hal_sdcard
    -Ilib/hal_heartbeat
    -Ilib/hal_provision
    -Ilib/hal_debug
    -Ilib/hal_fs
    -Ilib/hal_webserver
    -Ilib/hal_diag
    -Ilib/hal_diaglog
    -Ilib/hal_espnow
    -Ilib/hal_ota
    -Ilib/hal_mqtt
    -Ilib/os_settings
    -Ilib/os_events
    -Ilib/board_fingerprint
    -Ilib/tritium_splash
build_src_filter =
    +<../src/>
    +<../apps/starfield/>
    +<../lib/StarField/>
    +<../lib/display/>
    +<../lib/hal_wifi/>
    +<../lib/hal_heartbeat/>
    +<../lib/hal_provision/>
    +<../lib/hal_debug/>
    +<../lib/hal_fs/>
    +<../lib/hal_webserver/>
    +<../lib/hal_diag/>
    +<../lib/hal_diaglog/>
    +<../lib/hal_espnow/>
    +<../lib/hal_ota/>
    +<../lib/hal_mqtt/>
    +<../lib/os_settings/>
    +<../lib/os_events/>
    +<../lib/board_fingerprint/>
    +<../lib/tritium_splash/>
    +<../lib/hal_sdcard/>

; Tritium-OS with LVGL shell (for boards with touch displays)
[app_tritium_os_shell]
extends = app_tritium_os
build_flags =
    ${app_tritium_os.build_flags}
    -DENABLE_SHELL
    -Ilib/os_shell
    -Ilib/hal_touch
    -Ilib/hal_ui
build_src_filter =
    ${app_tritium_os.build_src_filter}
    +<../lib/os_shell/>
    +<../lib/hal_touch/>
    +<../lib/hal_ui/>

