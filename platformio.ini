; ESP32 Hardware Project - Multi-board Configuration
; Each environment targets a specific Waveshare ESP32-S3 display board.
;
; Build:   pio run -e <env-name>
; Upload:  pio run -e <env-name> -t upload
; Monitor: pio device monitor -b 115200
;
; App selection:
;   Each board defaults to the starfield app (-DAPP_STARFIELD).
;   To build a different app, change the -DAPP_xxx flag in the environment
;   or override on the CLI:
;     pio run -e touch-amoled-241b --build-flag="-DAPP_MY_APP"

[platformio]
default_envs = touch-amoled-241b
src_dir = src
lib_dir = lib
include_dir = include

; ---------------------------------------------------------------------------
; Shared settings for all ESP32-S3 boards
; ---------------------------------------------------------------------------
[env]
platform = espressif32
framework = arduino
extra_scripts = pre:pre_build.py
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
monitor_speed = 115200
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    lvgl/lvgl@~9.2.0
    espressif/esp32-camera@^2.0.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DLV_CONF_INCLUDE_SIMPLE
    -DDBG_LEVEL=4
    -Iinclude

; ---------------------------------------------------------------------------
; App presets (reusable sections)
; ---------------------------------------------------------------------------
[app_starfield]
build_flags =
    -DAPP_STARFIELD
    -Iapps/starfield
    -Ilib/StarField
build_src_filter =
    +<../src/>
    +<../apps/starfield/>
    +<../lib/StarField/>

[app_ui_demo]
build_flags =
    -DAPP_UI_DEMO
    -Iapps/ui_demo
    -Ilib/hal_ui
build_src_filter =
    +<../src/>
    +<../apps/ui_demo/>
    +<../lib/hal_ui/>

[app_wifi_setup]
build_flags =
    -DAPP_WIFI_SETUP
    -Iapps/wifi_setup
    -Ilib/hal_ui
    -Ilib/hal_wifi
build_src_filter =
    +<../src/>
    +<../apps/wifi_setup/>
    +<../lib/hal_ui/>
    +<../lib/hal_wifi/>

[app_system]
build_flags =
    -DAPP_SYSTEM
    -Iapps/system
    -Ilib/hal_imu
    -Ilib/hal_rtc
    -Ilib/hal_power
    -Ilib/hal_audio
    -Ilib/hal_sdcard
    -Ilib/hal_touch
    -Ilib/hal_camera
    -Ilib/hal_sleep
    -Ilib/hal_wifi
    -Ilib/hal_voice
build_src_filter =
    +<../src/>
    +<../apps/system/>
    +<../lib/hal_imu/>
    +<../lib/hal_rtc/>
    +<../lib/hal_power/>
    +<../lib/hal_audio/>
    +<../lib/hal_sdcard/>
    +<../lib/hal_touch/>
    +<../lib/hal_camera/>
    +<../lib/hal_sleep/>
    +<../lib/hal_wifi/>
    +<../lib/hal_voice/>

; ---------------------------------------------------------------------------
; ESP32-S3-Touch-AMOLED-2.41-B  (450x600, RM690B0 QSPI, FT6336 touch)
; STATUS: Pin-verified from Waveshare wiki
; ---------------------------------------------------------------------------
[env:touch-amoled-241b]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
build_flags =
    ${env.build_flags}
    ${app_starfield.build_flags}
    -DBOARD_TOUCH_AMOLED_241B
    -include include/boards/esp32_s3_touch_amoled_241b.h
build_src_filter = ${app_starfield.build_src_filter}

; UI Demo variant for 2.41-B
[env:touch-amoled-241b-ui]
