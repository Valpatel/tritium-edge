; Tritium-OS: full OS build with settings, events, OTA, mesh, BLE serial,
; file manager, web dashboard, and LVGL shell (for touch-equipped boards).
; Extends the fleet preset with all Tritium-OS core services.
[app_tritium_os]
build_flags =
    -DAPP_STARFIELD
    -DENABLE_WIFI
    -DENABLE_HEARTBEAT
    -DENABLE_WEBSERVER
    -DENABLE_DIAG
    -DENABLE_ESPNOW
    -DENABLE_OTA
    -DENABLE_FILE_MANAGER
    -DENABLE_SETTINGS
    -DENABLE_OS_EVENTS
    -DENABLE_STORAGE
    -DENABLE_BLE_SCANNER
    -DENABLE_WIFI_SCANNER
    -DENABLE_SIGHTING_BUFFER
    -DENABLE_SIGHTING_LOGGER
    -DDBG_LEVEL=2
    -Iapps/starfield
    -Ilib/StarField
    -Ilib/hal_wifi
    -Ilib/hal_sdcard
    -Ilib/hal_heartbeat
    -Ilib/hal_provision
    -Ilib/hal_debug
    -Ilib/hal_fs
    -Ilib/hal_webserver
    -Ilib/hal_diag
    -Ilib/hal_diaglog
    -Ilib/hal_espnow
    -Ilib/hal_ota
    -Ilib/os_settings
    -Ilib/os_events
    -Ilib/board_fingerprint
    -Ilib/tritium_splash
    -Ilib/hal_ble_scanner
    -Ilib/hal_wifi_scanner
    -Ilib/hal_sighting_buffer
    -Ilib/hal_sighting_logger
    -Ilib/sqlite3
build_src_filter =
    +<../src/>
    +<../apps/starfield/>
    +<../lib/StarField/>
    +<../lib/display/>
    +<../lib/hal_wifi/>
    +<../lib/hal_heartbeat/>
    +<../lib/hal_provision/>
    +<../lib/hal_debug/>
    +<../lib/hal_fs/>
    +<../lib/hal_webserver/>
    +<../lib/hal_diag/>
    +<../lib/hal_diaglog/>
    +<../lib/hal_espnow/>
    +<../lib/hal_ota/>
    +<../lib/os_settings/>
    +<../lib/os_events/>
    +<../lib/board_fingerprint/>
    +<../lib/tritium_splash/>
    +<../lib/hal_sdcard/>
    +<../lib/hal_ble_scanner/>
    +<../lib/hal_wifi_scanner/>
    +<../lib/hal_sighting_buffer/>
    +<../lib/hal_sighting_logger/>

; Tritium-OS with LVGL shell (for boards with touch displays)
[app_tritium_os_shell]
extends = app_tritium_os
build_flags =
    ${app_tritium_os.build_flags}
    -DENABLE_SHELL
    -Ilib/os_shell
    -Ilib/hal_touch
build_src_filter =
    ${app_tritium_os.build_src_filter}
    +<../lib/os_shell/>
    +<../lib/hal_touch/>

