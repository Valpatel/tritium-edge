<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRITIUM-EDGE // Fleet Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
/* Created by Matthew Valancy
   Copyright 2026 Valpatel Software LLC
   Licensed under AGPL-3.0 */

:root {
  --bg: #0a0a0a;
  --bg-card: #0f0f0f;
  --bg-card-hover: #141414;
  --cyan: #00ffd0;
  --cyan-dim: #00ffd044;
  --cyan-mid: #00ffd088;
  --green: #00ff88;
  --yellow: #ffdd00;
  --red: #ff3355;
  --orange: #ff8800;
  --text: #c8c8c8;
  --text-dim: #666;
  --border: #00ffd022;
  --border-bright: #00ffd044;
  --font: 'Courier New', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 255, 208, 0.015) 2px,
    rgba(0, 255, 208, 0.015) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Top Bar */
.topbar {
  height: 48px;
  background: #080808;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  z-index: 1000;
}

.topbar .logo {
  font-size: 15px;
  font-weight: bold;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan-dim), 0 0 20px rgba(0, 255, 208, 0.1);
  letter-spacing: 3px;
  white-space: nowrap;
}

.topbar .logo span {
  color: var(--text-dim);
  font-weight: normal;
  letter-spacing: 1px;
  font-size: 11px;
}

.topbar-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 20px;
}

.topbar-nav a {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 6px 12px;
  border: 1px solid transparent;
  border-radius: 3px;
  transition: all 0.15s;
}

.topbar-nav a:hover {
  color: var(--text);
  border-color: var(--border);
  background: rgba(0, 255, 208, 0.03);
}

.topbar-nav a.active {
  color: var(--cyan);
  border-color: var(--border-bright);
  background: rgba(0, 255, 208, 0.05);
}

.topbar-stats {
  display: flex;
  gap: 20px;
  margin-left: auto;
  font-size: 11px;
}

.topbar-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
}

.topbar-stat .val {
  font-weight: bold;
}

.topbar-stat .val.green { color: var(--green); }
.topbar-stat .val.red { color: var(--red); }
.topbar-stat .val.cyan { color: var(--cyan); }

.topbar-stat .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
}

.topbar-stat .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.topbar-stat .dot.red { background: var(--red); box-shadow: 0 0 4px var(--red); }

/* Map Container */
#fleet-map {
  width: 100%;
  height: calc(100vh - 48px);
  background: #0a0a0a;
}

/* Dark map tiles */
.leaflet-container { background: #0a0a0a; }

/* Popup styles */
.leaflet-popup-content-wrapper {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 255, 208, 0.05);
}

.leaflet-popup-tip { background: var(--bg-card); }

.leaflet-popup-content {
  font-family: var(--font);
  font-size: 11px;
  margin: 10px;
  min-width: 200px;
}

.leaflet-popup-content .popup-title {
  color: var(--cyan);
  font-weight: bold;
  font-size: 12px;
  margin-bottom: 6px;
  text-shadow: 0 0 8px var(--cyan-dim);
}

.leaflet-popup-content .popup-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 2px 0;
  border-bottom: 1px solid var(--border);
}

.leaflet-popup-content .popup-row:last-child { border-bottom: none; }
.leaflet-popup-content .popup-label { color: var(--text-dim); }
.leaflet-popup-content .popup-val { color: var(--text); }

/* Tooltip */
.leaflet-tooltip {
  background: var(--bg-card);
  color: var(--cyan);
  border: 1px solid var(--border-bright);
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 4px 8px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
}

.leaflet-tooltip-top:before { border-top-color: var(--border-bright); }
.leaflet-tooltip-bottom:before { border-bottom-color: var(--border-bright); }

/* Leaflet controls dark theme */
.leaflet-control-zoom a {
  background: var(--bg-card) !important;
  color: var(--cyan) !important;
  border-color: var(--border) !important;
}

.leaflet-control-zoom a:hover {
  background: var(--bg-card-hover) !important;
}

.leaflet-control-attribution {
  background: rgba(10, 10, 10, 0.8) !important;
  color: var(--text-dim) !important;
  font-size: 9px !important;
}

.leaflet-control-attribution a { color: var(--cyan) !important; }

/* Unplaced nodes panel */
.unplaced-panel {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 4px;
  padding: 12px;
  max-width: 320px;
  max-height: 240px;
  overflow-y: auto;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
}

.unplaced-panel .panel-title {
  color: var(--cyan);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-shadow: 0 0 8px var(--cyan-dim);
}

.unplaced-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}

.unplaced-item:last-child { border-bottom: none; }

.unplaced-item .node-name {
  color: var(--cyan);
  font-size: 11px;
}

.unplaced-item .node-board {
  color: var(--text-dim);
  font-size: 10px;
  flex: 1;
}

.unplaced-item .place-btn {
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--cyan);
  font-family: var(--font);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}

.unplaced-item .place-btn:hover {
  background: rgba(0, 255, 208, 0.1);
  border-color: var(--cyan);
}

.unplaced-item .place-btn.placing {
  color: var(--yellow);
  border-color: var(--yellow);
  animation: blink 1s infinite;
}

/* Placement banner */
.placement-banner {
  display: none;
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--yellow);
  border-radius: 4px;
  padding: 8px 16px;
  font-size: 11px;
  color: var(--yellow);
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 0 20px rgba(255, 221, 0, 0.15);
  cursor: pointer;
}

.placement-banner.active { display: block; }

/* Legend */
.legend {
  position: absolute;
  top: 60px;
  right: 20px;
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 11px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
}

.legend-title {
  color: var(--cyan);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-shadow: 0 0 8px var(--cyan-dim);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 2px 0;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid #0a0a0a;
}

.legend-dot.online {
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}

.legend-dot.offline {
  background: var(--red);
  box-shadow: 0 0 4px var(--red);
}

.legend-count {
  color: var(--text-dim);
  margin-left: auto;
  font-weight: bold;
}

.legend-count.green { color: var(--green); }
.legend-count.red { color: var(--red); }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes pulse-green {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="logo">TRITIUM-EDGE <span>// Fleet Map</span></div>
  <div class="topbar-nav">
    <a href="/">Admin Panel</a>
    <a href="/map" class="active">Fleet Map</a>
  </div>
  <div class="topbar-stats">
    <div class="topbar-stat">
      <span class="dot green"></span>
      Online <span class="val green" id="stat-online">0</span>
    </div>
    <div class="topbar-stat">
      <span class="dot red"></span>
      Offline <span class="val red" id="stat-offline">0</span>
    </div>
    <div class="topbar-stat">
      Total <span class="val cyan" id="stat-total">0</span>
    </div>
  </div>
</div>

<!-- Map -->
<div id="fleet-map"></div>

<!-- Legend -->
<div class="legend" id="legend">
  <div class="legend-title">Fleet Nodes</div>
  <div class="legend-item">
    <div class="legend-dot online"></div>
    <span>Online</span>
    <span class="legend-count green" id="legend-online">0</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot offline"></div>
    <span>Offline</span>
    <span class="legend-count red" id="legend-offline">0</span>
  </div>
</div>

<!-- Placement banner -->
<div class="placement-banner" id="placement-banner" onclick="cancelPlacement()">
  Placing: <span id="placing-name"></span> — click map to set location (click here to cancel)
</div>

<!-- Unplaced nodes -->
<div class="unplaced-panel" id="unplaced-panel" style="display:none">
  <div class="panel-title">Unplaced Nodes</div>
  <div id="unplaced-list"></div>
</div>

<script>
// Created by Matthew Valancy
// Copyright 2026 Valpatel Software LLC
// Licensed under AGPL-3.0

var map = L.map('fleet-map', {
  center: [39.8283, -98.5795],
  zoom: 4,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20,
}).addTo(map);

var markers = {};
var placingNodeId = null;
var refreshTimer = null;

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function makeIcon(online) {
  var color = online ? '#00ff88' : '#ff3355';
  var glow = online ? 'rgba(0,255,136,0.4)' : 'rgba(255,51,85,0.3)';
  var pulse = online ? 'animation:pulse-green 2s infinite;' : '';
  return L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;border-radius:50%;background:' + color +
      ';box-shadow:0 0 8px ' + glow + ',0 0 16px ' + glow +
      ';border:2px solid #0a0a0a;' + pulse + '"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

function buildPopup(n) {
  var color = n.online ? '#00ff88' : '#ff3355';
  var status = n.online ? 'Online' : 'Offline';
  var caps = (n.capabilities || []).join(', ') || 'none';
  var rssi = n.rssi != null ? n.rssi + ' dBm' : '--';

  var html = '<div class="popup-title">' + escHtml(n.device_name || n.device_id) + '</div>';
  html += '<div class="popup-row"><span class="popup-label">ID</span><span class="popup-val">' + escHtml(n.device_id) + '</span></div>';
  html += '<div class="popup-row"><span class="popup-label">Board</span><span class="popup-val">' + escHtml(n.board) + '</span></div>';
  html += '<div class="popup-row"><span class="popup-label">Firmware</span><span class="popup-val">' + escHtml(n.version) + '</span></div>';
  html += '<div class="popup-row"><span class="popup-label">IP</span><span class="popup-val">' + escHtml(n.ip || '--') + '</span></div>';
  html += '<div class="popup-row"><span class="popup-label">Status</span><span class="popup-val" style="color:' + color + '">' + status + '</span></div>';
  html += '<div class="popup-row"><span class="popup-label">RSSI</span><span class="popup-val">' + rssi + '</span></div>';
  html += '<div class="popup-row"><span class="popup-label">Capabilities</span><span class="popup-val">' + escHtml(caps) + '</span></div>';
  html += '<div class="popup-row"><span class="popup-label">Last Seen</span><span class="popup-val">' + escHtml(n.age) + '</span></div>';

  if (n.location && n.location.label) {
    html += '<div class="popup-row"><span class="popup-label">Label</span><span class="popup-val">' + escHtml(n.location.label) + '</span></div>';
  }

  return html;
}

async function fetchNodes() {
  try {
    var resp = await fetch('/api/map/nodes');
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    console.error('Failed to fetch nodes:', e);
    return null;
  }
}

async function refreshMap() {
  var data = await fetchNodes();
  if (!data) return;

  // Remove old markers
  Object.values(markers).forEach(function(m) { map.removeLayer(m); });
  markers = {};

  var bounds = [];
  var unplaced = [];
  var onlineCount = 0;
  var offlineCount = 0;

  data.nodes.forEach(function(n) {
    if (n.online) onlineCount++;
    else offlineCount++;

    if (n.location) {
      var marker = L.marker([n.location.lat, n.location.lng], {
        icon: makeIcon(n.online),
      }).addTo(map);

      marker.bindPopup(buildPopup(n));
      marker.bindTooltip(escHtml(n.device_name || n.device_id), {
        direction: 'top',
        offset: [0, -10],
      });

      markers[n.device_id] = marker;
      bounds.push([n.location.lat, n.location.lng]);
    } else {
      unplaced.push(n);
    }
  });

  // Fit bounds on first load with placed nodes
  if (bounds.length > 0 && !refreshMap._fitted) {
    map.fitBounds(bounds, { padding: [60, 60], maxZoom: 14 });
    refreshMap._fitted = true;
  }

  // Update stats
  document.getElementById('stat-online').textContent = onlineCount;
  document.getElementById('stat-offline').textContent = offlineCount;
  document.getElementById('stat-total').textContent = data.nodes.length;
  document.getElementById('legend-online').textContent = onlineCount;
  document.getElementById('legend-offline').textContent = offlineCount;

  // Unplaced panel
  var panel = document.getElementById('unplaced-panel');
  var list = document.getElementById('unplaced-list');
  if (unplaced.length > 0) {
    panel.style.display = '';
    list.innerHTML = unplaced.map(function(n) {
      var placing = placingNodeId === n.device_id;
      var btnClass = 'place-btn' + (placing ? ' placing' : '');
      return '<div class="unplaced-item">' +
        '<span class="node-name">' + escHtml(n.device_name || n.device_id.substring(0, 12)) + '</span>' +
        '<span class="node-board">' + escHtml(n.board) + '</span>' +
        '<button class="' + btnClass + '" onclick="startPlacing(\'' +
          escHtml(n.device_id) + '\',\'' + escHtml(n.device_name || n.device_id) + '\')">' +
          (placing ? 'Placing...' : 'Place') + '</button>' +
      '</div>';
    }).join('');
  } else {
    panel.style.display = 'none';
  }
}
refreshMap._fitted = false;

function startPlacing(deviceId, deviceName) {
  placingNodeId = deviceId;
  document.getElementById('fleet-map').style.cursor = 'crosshair';
  var banner = document.getElementById('placement-banner');
  document.getElementById('placing-name').textContent = deviceName || deviceId;
  banner.classList.add('active');
  refreshMap();
}

function cancelPlacement() {
  placingNodeId = null;
  document.getElementById('fleet-map').style.cursor = '';
  document.getElementById('placement-banner').classList.remove('active');
  refreshMap();
}

async function placeNode(deviceId, lat, lng) {
  placingNodeId = null;
  document.getElementById('fleet-map').style.cursor = '';
  document.getElementById('placement-banner').classList.remove('active');

  try {
    await fetch('/api/map/nodes/' + encodeURIComponent(deviceId) + '/location', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat: lat, lng: lng }),
    });
  } catch (e) {
    console.error('Failed to place node:', e);
  }

  refreshMap();
}

// Map click handler for placing nodes
map.on('click', function(e) {
  if (placingNodeId) {
    placeNode(placingNodeId, e.latlng.lat, e.latlng.lng);
  }
});

// Initial load
refreshMap();

// Auto-refresh every 30 seconds
refreshTimer = setInterval(refreshMap, 30000);
</script>
</body>
</html>
